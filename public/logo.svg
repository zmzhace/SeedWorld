<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Globe circle — the world that grows from the seed -->
  <circle cx="24" cy="18" r="13" stroke="#2563EB" stroke-width="2.5" fill="none"/>

  <!-- Horizontal latitude line across globe -->
  <ellipse cx="24" cy="18" rx="13" ry="5" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Stem rising from seed into globe -->
  <line x1="24" y1="44" x2="24" y2="31" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left leaf inside the globe -->
  <path d="M24 24 Q16 16 18 10" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Right leaf inside the globe -->
  <path d="M24 24 Q32 16 30 10" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Seed shape at the bottom -->
  <ellipse cx="24" cy="44" rx="3.5" ry="2.5" fill="#F97316"/>
</svg>
